name: Build Plugins

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/assets/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/assets/**'
      - '.github/ISSUE_TEMPLATE/**'
jobs:
  prepare:
    if: contains(github.event.head_commit.message, '[ci]') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'Hi3Helper.Hypergryph.Core/**'
              - '.github/workflows/**'
            endfield:
              - 'Hi3Helper.Plugin.Endfield/**'
            arknights:
              - 'Hi3Helper.Plugin.Arknights/**'

      - name: Determine Build Matrix
        id: set-matrix
        run: |
          # 获取Commit Message和PR标题，转为小写便于匹配
          MSG=$(echo "${{ github.event.head_commit.message }} ${{ github.event.pull_request.title }}" | tr '[:upper:]' '[:lower:]')
          
          # 如果修改了Core核心库，则全量编译
          if [[ "${{ steps.filter.outputs.core }}" == "true" ]] || [[ "$MSG" == *"(core)"* ]]; then
            echo "🚀 检测到 Core 核心库修改，将并行编译所有插件！"
            echo 'matrix=["Hi3Helper.Plugin.Endfield", "Hi3Helper.Plugin.Arknights"]' >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 如果代码修改仅限Endfield
          if [[ "${{ steps.filter.outputs.endfield }}" == "true" ]] || [[ "$MSG" == *"(endfield)"* ]]; then
            echo "only build Endfield。"
            echo 'matrix=["Hi3Helper.Plugin.Endfield"]' >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 如果代码修改仅限 Arknights
          if [[ "${{ steps.filter.outputs.arknights }}" == "true" ]] || [[ "$MSG" == *"(arknights)"* ]]; then
            echo "only build Arknights"
            echo 'matrix=["Hi3Helper.Plugin.Arknights"]' >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "All build"
          echo 'matrix=["Hi3Helper.Plugin.Endfield", "Hi3Helper.Plugin.Arknights"]' >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore and Build ${{ matrix.plugin }}
        run: |
          dotnet restore ${{ matrix.plugin }}/${{ matrix.plugin }}.csproj
          dotnet build ${{ matrix.plugin }}/${{ matrix.plugin }}.csproj -c Release --no-restore

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}-Release
          path: ${{ matrix.plugin }}/bin/Release/net10.0/