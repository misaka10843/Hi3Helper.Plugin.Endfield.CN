name: Release Plugins

on:
  workflow_dispatch:
    inputs:
      plugin_selection:
        description: 'Plugin to release'
        required: true
        default: 'all'
        type: choice
        options: [ all, Hi3Helper.Plugin.Endfield, Hi3Helper.Plugin.Arknights ]
      endfield_version:
        description: 'Endfield version (e.g. 0.1.2)'
        default: ''
        type: string
      arknights_version:
        description: 'Arknights version (e.g. 0.1.0)'
        default: ''
        type: string
      publish_profile:
        description: 'Publish profile to use'
        required: true
        type: choice
        options:
          - ReleaseNoReflectionPublish-O1
          - ReleaseNoReflectionPublish-O2
          - ReleasePublish-O1
          - ReleasePublish-O2
          - DebugPublish
          - DebugNoReflectionPublish
        default: ReleaseNoReflectionPublish-O1

permissions:
  id-token: write
  contents: write
  attestations: write
  pull-requests: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          END_VER="${{ github.event.inputs.endfield_version }}"
          ARK_VER="${{ github.event.inputs.arknights_version }}"
          SELECT="${{ github.event.inputs.plugin_selection }}"
          
          RESULT="[]"
          if [[ ("$SELECT" == "all" || "$SELECT" == "Hi3Helper.Plugin.Endfield") && -n "$END_VER" ]]; then
            RESULT=$(echo $RESULT | jq -c '. += [{"name": "Hi3Helper.Plugin.Endfield", "short": "Endfield", "version": "'$END_VER'"}]')
          fi
          if [[ ("$SELECT" == "all" || "$SELECT" == "Hi3Helper.Plugin.Arknights") && -n "$ARK_VER" ]]; then
            RESULT=$(echo $RESULT | jq -c '. += [{"name": "Hi3Helper.Plugin.Arknights", "short": "Arknights", "version": "'$ARK_VER'"}]')
          fi
          
          echo "matrix=$RESULT" >> $GITHUB_OUTPUT

  update_repo_version:
    needs: prepare_release
    if: needs.prepare_release.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Bump Version in .csproj
        run: |
          END_VER="${{ github.event.inputs.endfield_version }}"
          ARK_VER="${{ github.event.inputs.arknights_version }}"
          SELECT="${{ github.event.inputs.plugin_selection }}"
          UPDATED=false
          
          if [[ ("$SELECT" == "all" || "$SELECT" == "Hi3Helper.Plugin.Endfield") && -n "$END_VER" ]]; then
            sed -i -E "s/<Version>.*<\/Version>/<Version>$END_VER<\/Version>/" Hi3Helper.Plugin.Endfield/Hi3Helper.Plugin.Endfield.csproj
            UPDATED=true
          fi
          
          if [[ ("$SELECT" == "all" || "$SELECT" == "Hi3Helper.Plugin.Arknights") && -n "$ARK_VER" ]]; then
            sed -i -E "s/<Version>.*<\/Version>/<Version>$ARK_VER<\/Version>/" Hi3Helper.Plugin.Arknights/Hi3Helper.Plugin.Arknights.csproj
            UPDATED=true
          fi
          
          echo "UPDATED=$UPDATED" >> $GITHUB_ENV

      - name: Commit and Push changes
        if: env.UPDATED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "chore(release): bump plugin versions [skip ci]" && git push)
  release:
    needs: [ prepare_release, update_repo_version ]
    if: needs.prepare_release.outputs.matrix != '[]'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.prepare_release.outputs.matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          ref: ${{ github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.item.name }}/${{ matrix.item.name }}.csproj

      - name: Build project
        run: dotnet build --configuration Release ${{ matrix.item.name }}/${{ matrix.item.name }}.csproj --no-restore /p:Version=${{ matrix.item.version }}

      - name: Publish with selected profile
        run: dotnet publish ${{ matrix.item.name }}/${{ matrix.item.name }}.csproj --configuration Release --runtime win-x64 /p:PublishProfile=${{ github.event.inputs.publish_profile }} /p:Version=${{ matrix.item.version }} -o ./publish_output

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: './publish_output/**'

      # --- STEP 1: Zip Clean Files (Before Indexer runs) ---
      # We save this OUTSIDE the publish folder so Indexer doesn't process it.
      #- name: Create Clean Release Zip
      #  run: Compress-Archive -Path ./publish/* -DestinationPath ./Endfield_v${{ inputs.version }}.zip

      # --- STEP 2: Indexer (Modifies publish folder) ---
      # This generates the .br files and the Launcher-specific zip inside ./publish
      - name: Run Indexer
        run: .\Indexer.exe .\publish_output

      # --- STEP 4: Generate Changelog ---
      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ matrix.item.short }}@v${{ matrix.item.version }} --strip header
        id: git-cliff

      # --- STEP 5: Create GitHub Release ---
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.item.short }}@v${{ matrix.item.version }}
          name: ${{ matrix.item.short }} v${{ matrix.item.version }}
          body: ${{ steps.git-cliff.outputs.content }}
          files: ./publish_output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: misaka10843/CollapsePlugin-ReleaseRepo
          path: ./target-repo
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Copy files to target repo
        run: |
          $shortName = "${{ matrix.item.short }}"
          $targetPath = "./target-repo/$shortName"
          
          New-Item -ItemType Directory -Force -Path $targetPath/build
          New-Item -ItemType Directory -Force -Path $targetPath/Lib

          Copy-Item -Path ./publish_output/*.dll -Destination $targetPath/ -ErrorAction SilentlyContinue
          Copy-Item -Path ./publish_output/*.pdb -Destination $targetPath/ -ErrorAction SilentlyContinue
          Copy-Item -Path ./publish_output/manifest.json -Destination $targetPath/ -ErrorAction SilentlyContinue
          Copy-Item -Path "./publish_output/Lib/*" -Destination "$targetPath/Lib/" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path ./publish_output/*.zip -Destination $targetPath/build/

      - name: Create Pull Request in Release Repo
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          path: ./target-repo
          branch: ${{ matrix.item.short }}-plugin-release-${{ matrix.item.version }}
          base: main
          title: 'Release ${{ matrix.item.short }} Plugin v${{ matrix.item.version }}'
          body: |
            Automated release of ${{ matrix.item.short }} Plugin v${{ matrix.item.version }}
            
            ${{ steps.git-cliff.outputs.content }}
            
            Files updated:
            - ${{ matrix.item.short }}.dll
            - ${{ matrix.item.short }}.pdb
            - manifest.json
            - SevenZipExtractor.pdb
            - Lib/*
            - build/*.zip
          commit-message: 'Release ${{ matrix.item.short }} Plugin v${{ matrix.item.version }}'
          delete-branch: false
